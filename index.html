<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grand Ecran">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Grand Ecran</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    :root {
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 200;
      padding-top: var(--safe-top);
      transition: opacity 0.4s ease;
    }
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading .logo {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #loading .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth screen ── */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 200;
      padding: var(--safe-top) 40px var(--safe-bottom);
    }
    #auth-screen .logo {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #auth-screen .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
      max-width: 260px;
    }
    #auth-btn {
      margin-top: 8px;
      padding: 13px 32px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #auth-btn:active { opacity: 0.7; }
    .auth-hint {
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      text-align: center;
      max-width: 220px;
      line-height: 1.5;
    }

    /* ── iframe ── */
    #appFrame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      background: #000;
      z-index: 10;
      /* Toujours visible — le loading est par-dessus */
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="logo">Grand Écran</div>
    <div class="spinner"></div>
  </div>

  <div id="auth-screen">
    <div class="logo">Grand Écran</div>
    <p class="subtitle">Connecte-toi avec ton compte Google pour accéder à l'application.</p>
    <button id="auth-btn">Se connecter avec Google</button>
    <p class="auth-hint">Une fois connecté, reviens sur cette page.</p>
  </div>

  <iframe
    id="appFrame"
    src=""
    allow="camera; microphone"
    allowfullscreen
  ></iframe>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbw7HsfZuBeKWpisGDTSOcsy8BjagnTz33HLx6GA_EJ6Yu0wpqe9Yp57MevPBXfUpbWz/exec';

    var elLoading    = document.getElementById('loading');
    var elAuthScreen = document.getElementById('auth-screen');
    var elFrame      = document.getElementById('appFrame');
    var elAuthBtn    = document.getElementById('auth-btn');

    // Flag : est-ce qu'on attend un retour d'auth ?
    var waitingForAuthReturn = false;

    // ─────────────────────────────────────────
    // SAFE AREAS
    // ─────────────────────────────────────────
    function sendSafeAreas() {
      var probe = document.createElement('div');
      probe.style.cssText = 'position:fixed;top:env(safe-area-inset-top,0px);left:env(safe-area-inset-left,0px);right:env(safe-area-inset-right,0px);bottom:env(safe-area-inset-bottom,0px);width:0;height:0;pointer-events:none;visibility:hidden;opacity:0';
      document.body.appendChild(probe);
      var s = window.getComputedStyle(probe);
      var msg = {
        type:   'GRAND_ECRAN_SAFE_AREAS',
        top:    parseInt(s.top)    || 0,
        left:   parseInt(s.left)   || 0,
        right:  parseInt(s.right)  || 0,
        bottom: parseInt(s.bottom) || 0
      };
      document.body.removeChild(probe);
      try { elFrame.contentWindow.postMessage(msg, '*'); } catch(e) {}
    }

    // ─────────────────────────────────────────
    // AFFICHAGE
    // ─────────────────────────────────────────
    function showLoading() {
      elLoading.classList.remove('fade-out');
      elLoading.style.display = 'flex';
      elAuthScreen.style.display = 'none';
    }

    function showAuth() {
      elLoading.style.display = 'none';
      elAuthScreen.style.display = 'flex';
    }

    function showApp() {
      // Fade out le loading — l'iframe en dessous est déjà chargée
      elLoading.classList.add('fade-out');
      setTimeout(function() {
        elLoading.style.display = 'none';
      }, 400);
      elAuthScreen.style.display = 'none';

      // Envoyer les safe areas
      sendSafeAreas();
      setTimeout(sendSafeAreas, 800);
      setTimeout(sendSafeAreas, 2000);
    }

    // ─────────────────────────────────────────
    // LOGIQUE PRINCIPALE
    //
    // On charge l'iframe et on attend son onload.
    // On NE dépend PAS de GAS_READY (trop peu fiable cross-origin).
    //
    // Stratégie de détection d'erreur :
    // GAS met normalement 3-8s à charger.
    // La page d'erreur Google Drive charge en < 1s.
    //
    // Donc :
    // - Si onload se déclenche en < 2s  → probablement une erreur → showAuth
    // - Si onload se déclenche en > 2s  → probablement l'app réelle → showApp
    // - Si onload ne se déclenche pas en 15s → showAuth (timeout réseau)
    // ─────────────────────────────────────────
    var loadStartTime = null;
    var hardTimeout   = null;

    function loadApp() {
      showLoading();
      waitingForAuthReturn = false;

      // Reset iframe proprement
      elFrame.onload = null;
      elFrame.src = 'about:blank';

      setTimeout(function() {
        loadStartTime = Date.now();
        clearTimeout(hardTimeout);

        elFrame.onload = onFrameLoad;

        // Hard timeout — si rien après 15s c'est bloqué
        hardTimeout = setTimeout(function() {
          showAuth();
        }, 15000);

        elFrame.src = GAS_URL;
      }, 100);
    }

    function onFrameLoad() {
      clearTimeout(hardTimeout);

      var elapsed = Date.now() - loadStartTime;

      // about:blank se charge quasi instantanément — ignorer
      if (elapsed < 50) return;

      if (elapsed < 2000) {
        // Chargé trop vite = page d'erreur Google (auth requise)
        // ou redirection OAuth (qui charge puis redirige vite)
        // → montrer l'écran auth
        showAuth();
      } else {
        // Chargé normalement = l'app GAS réelle
        showApp();
      }
    }

    // ─────────────────────────────────────────
    // AUTH BUTTON
    // Ouvre GAS dans Safari (top-level, hors iframe)
    // pour que l'OAuth puisse se faire normalement
    // ─────────────────────────────────────────
    elAuthBtn.addEventListener('click', function() {
      waitingForAuthReturn = true;
      window.open(GAS_URL, '_blank');
    });

    // ─────────────────────────────────────────
    // RETOUR AU PWA APRÈS AUTH
    // visibilitychange = l'utilisateur revient de Safari
    // ─────────────────────────────────────────
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState !== 'visible') return;
      if (waitingForAuthReturn) {
        // Retour après auth → recharger l'iframe
        // La session Google est maintenant établie
        loadApp();
      }
    });

    // ─────────────────────────────────────────
    // GAS_READY — optionnel, accélère si disponible
    // Si GAS envoie ce message, on affiche l'app immédiatement
    // sans attendre le timer
    // ─────────────────────────────────────────
    window.addEventListener('message', function(event) {
      if (!event.data || typeof event.data !== 'object') return;

      if (event.data.type === 'GAS_READY') {
        clearTimeout(hardTimeout);
        showApp();
      }

      if (event.data.type === 'GRAND_ECRAN_REQUEST_SAFE_AREAS') {
        sendSafeAreas();
      }
    });

    // ─────────────────────────────────────────
    // ORIENTATION
    // ─────────────────────────────────────────
    window.addEventListener('orientationchange', function() {
      setTimeout(sendSafeAreas, 400);
    });
    window.addEventListener('resize', function() {
      setTimeout(sendSafeAreas, 200);
    });

    // ─────────────────────────────────────────
    // DÉMARRAGE
    // ─────────────────────────────────────────
    loadApp();
  </script>
</body>
</html>
