<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grand Ecran">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <title>Grand Ecran</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    :root {
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Loading ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 200;
      padding-top: var(--safe-top);
      transition: opacity 0.4s ease;
    }
    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #loading .logo {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    #loading .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: rgba(255,255,255,0.8);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Auth screen ── */
    #auth-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      z-index: 200;
      padding: var(--safe-top) 40px var(--safe-bottom);
    }
    #auth-screen .logo {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #auth-screen .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
      max-width: 260px;
    }
    #auth-btn {
      margin-top: 8px;
      padding: 13px 32px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    #auth-btn:active { opacity: 0.7; }
    .auth-hint {
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      text-align: center;
      max-width: 220px;
      line-height: 1.5;
    }

    /* ── iframe ── */
    #appFrame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      background: #000;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="logo">Grand Écran</div>
    <div class="spinner"></div>
  </div>

  <div id="auth-screen">
    <div class="logo">Grand Écran</div>
    <p class="subtitle">Connecte-toi avec ton compte Google pour accéder à l'application.</p>
    <button id="auth-btn">Se connecter avec Google</button>
    <p class="auth-hint">Une fois connecté, reviens sur cette page.</p>
  </div>

  <iframe
    id="appFrame"
    src=""
    allow="camera; microphone"
    allowfullscreen
  ></iframe>

  <script>
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbw7HsfZuBeKWpisGDTSOcsy8BjagnTz33HLx6GA_EJ6Yu0wpqe9Yp57MevPBXfUpbWz/exec';

    var elLoading    = document.getElementById('loading');
    var elAuthScreen = document.getElementById('auth-screen');
    var elFrame      = document.getElementById('appFrame');
    var elAuthBtn    = document.getElementById('auth-btn');

    var waitingForAuthReturn = false;
    var appShown             = false;
    var loadStartTime        = null;
    var hardTimeout          = null;

    // ─────────────────────────────────────────
    // SAFE AREAS
    // ─────────────────────────────────────────
    function sendSafeAreas() {
      var probe = document.createElement('div');
      probe.style.cssText = [
        'position:fixed',
        'top:env(safe-area-inset-top,0px)',
        'left:env(safe-area-inset-left,0px)',
        'right:env(safe-area-inset-right,0px)',
        'bottom:env(safe-area-inset-bottom,0px)',
        'width:0', 'height:0',
        'pointer-events:none', 'visibility:hidden', 'opacity:0'
      ].join(';');
      document.body.appendChild(probe);
      var s = window.getComputedStyle(probe);
      var msg = {
        type:   'GRAND_ECRAN_SAFE_AREAS',
        top:    parseInt(s.top)    || 0,
        left:   parseInt(s.left)   || 0,
        right:  parseInt(s.right)  || 0,
        bottom: parseInt(s.bottom) || 0
      };
      document.body.removeChild(probe);
      try { elFrame.contentWindow.postMessage(msg, '*'); } catch(e) {}
    }

    // ─────────────────────────────────────────
    // AFFICHAGE
    // ─────────────────────────────────────────
    function showLoading() {
      elLoading.classList.remove('fade-out');
      elLoading.style.display = 'flex';
      elAuthScreen.style.display = 'none';
    }

    function showAuth() {
      elLoading.style.display = 'none';
      elAuthScreen.style.display = 'flex';
      appShown = false;
    }

    function showApp() {
      if (appShown) return;
      appShown = true;
      clearTimeout(hardTimeout);

      elLoading.classList.add('fade-out');
      setTimeout(function() { elLoading.style.display = 'none'; }, 400);
      elAuthScreen.style.display = 'none';

      sendSafeAreas();
      setTimeout(sendSafeAreas, 800);
      setTimeout(sendSafeAreas, 2000);
    }

    // ─────────────────────────────────────────
    // CHARGEMENT
    // ─────────────────────────────────────────
    function loadApp() {
      appShown             = false;
      waitingForAuthReturn = false;
      showLoading();

      elFrame.onload = null;
      elFrame.src    = 'about:blank';

      setTimeout(function() {
        loadStartTime = Date.now();
        clearTimeout(hardTimeout);

        elFrame.onload = onFrameLoad;

        // Hard timeout 20s
        hardTimeout = setTimeout(function() {
          if (!appShown) showAuth();
        }, 20000);

        elFrame.src = GAS_URL;
      }, 100);
    }

    function onFrameLoad() {
      var elapsed = Date.now() - loadStartTime;

      // Ignorer about:blank
      if (elapsed < 50) return;

      // À ce stade on a reçu onload MAIS on ne sait pas encore
      // si c'est l'app ou une page d'erreur GAS.
      // On attend 3s supplémentaires pour laisser le temps
      // à GAS_READY ou GAS_NEED_AUTH d'arriver via postMessage.
      // Si rien n'arrive → on suppose que c'est l'app (showApp).
      // Si GAS_NEED_AUTH arrive avant → showAuth() est appelé immédiatement.
      setTimeout(function() {
        if (!appShown) {
          clearTimeout(hardTimeout);
          showApp();
        }
      }, 3000);
    }

    // ─────────────────────────────────────────
    // AUTH BUTTON
    // ─────────────────────────────────────────
    elAuthBtn.addEventListener('click', function() {
      waitingForAuthReturn = true;
      // Ouvre GAS en top-level dans Safari
      // → OAuth peut se dérouler normalement hors iframe
      window.open(GAS_URL, '_blank');
    });

    // ─────────────────────────────────────────
    // RETOUR AU PWA APRÈS AUTH
    // visibilitychange = l'utilisateur revient de Safari
    // ─────────────────────────────────────────
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState !== 'visible') return;
      if (waitingForAuthReturn) {
        waitingForAuthReturn = false;
        loadApp();
      }
    });

    // ─────────────────────────────────────────
    // MESSAGES DEPUIS L'IFRAME GAS
    // ─────────────────────────────────────────
    window.addEventListener('message', function(event) {
      if (!event.data || typeof event.data !== 'object') return;

      switch (event.data.type) {

        case 'GAS_READY':
          // GAS confirme qu'il est chargé et authentifié
          // → afficher l'app immédiatement sans attendre le timer
          clearTimeout(hardTimeout);
          showApp();
          break;

        case 'GAS_NEED_AUTH':
          // GAS signale explicitement qu'il n'a pas de session
          // → afficher l'écran de connexion immédiatement
          clearTimeout(hardTimeout);
          showAuth();
          break;

        case 'GRAND_ECRAN_REQUEST_SAFE_AREAS':
          sendSafeAreas();
          break;
      }
    });

    // ─────────────────────────────────────────
    // ORIENTATION / RESIZE
    // ─────────────────────────────────────────
    window.addEventListener('orientationchange', function() {
      setTimeout(sendSafeAreas, 400);
      setTimeout(sendSafeAreas, 900);
    });
    window.addEventListener('resize', function() {
      setTimeout(sendSafeAreas, 200);
    });

    // ─────────────────────────────────────────
    // DÉMARRAGE
    // ─────────────────────────────────────────
    loadApp();
  </script>
</body>
</html>
