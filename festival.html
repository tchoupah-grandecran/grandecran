<!-- festival-page.html — Grand Écran · Festival Season v3 — FIXED v2 -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap');

:root {
  --fs-bg:           #0C0C0E;
  --fs-surface:      #131316;
  --fs-panel:        #1A1A1F;
  --fs-border:       rgba(255,255,255,0.07);
  --fs-border-hi:    rgba(255,255,255,0.14);
  --fs-text:         #F0EEF5;
  --fs-dim:          rgba(240,238,245,0.38);
  --fs-muted:        rgba(240,238,245,0.18);
  --ceremony-accent: #E8B200;
  --ceremony-dim:    rgba(232,178,0,0.12);
  --ceremony-glow:   rgba(232,178,0,0.25);
  --fs-radius:       16px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

.fs-shell{max-width:600px;margin:0 auto;padding:0 0 110px;display:flex;flex-direction:column}

/* ── HEADER ── */
.fs-header{padding:28px 20px 0}
.fs-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.fs-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--ceremony-accent);box-shadow:0 0 8px var(--ceremony-glow);transition:background .4s,box-shadow .4s}
.fs-eyebrow-lbl{font:700 10px/1 'Inter',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:var(--fs-dim)}
.fs-page-title{font:800 clamp(24px,7vw,32px)/1 'Syne',sans-serif;letter-spacing:-1px;color:var(--fs-text);margin-bottom:4px}
.fs-page-title em{font-style:normal;color:var(--ceremony-accent);transition:color .4s}
.fs-page-sub{font:400 12px/1.5 'Inter',sans-serif;color:var(--fs-dim)}
.fs-rule{height:1px;background:linear-gradient(90deg,var(--fs-border-hi) 0%,transparent 80%);margin-top:20px}

/* ── STRIP ── */
.fs-strip-section{padding:18px 0 0}
.fs-section-lbl{font:700 9px/1 'Inter',sans-serif;letter-spacing:.15em;text-transform:uppercase;color:var(--fs-muted);padding:0 20px;margin-bottom:10px}
.fs-strip-outer{position:relative;overflow:hidden}
.fs-strip-outer::before,.fs-strip-outer::after{content:'';position:absolute;top:0;bottom:0;width:28px;z-index:2;pointer-events:none}
.fs-strip-outer::before{left:0;background:linear-gradient(90deg,var(--fs-bg),transparent)}
.fs-strip-outer::after{right:0;background:linear-gradient(-90deg,var(--fs-bg),transparent)}
.fs-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 20px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.fs-strip::-webkit-scrollbar{display:none}

/* ── TILE — with trophy watermark ── */
.fs-tile{
  flex-shrink:0;min-width:76px;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:10px 12px;border-radius:12px;
  border:1px solid var(--fs-border);background:var(--fs-panel);
  cursor:pointer;transition:all .22s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.fs-tile:hover{border-color:var(--fs-border-hi);transform:translateY(-2px)}
.fs-tile.active{border-color:var(--ceremony-accent);background:var(--ceremony-dim);box-shadow:0 0 18px var(--ceremony-glow)}

/* Trophy watermark inside tile */
.fs-tile-trophy-bg{
  position:absolute;
  bottom:-6px;right:-6px;
  width:52px;height:auto;
  opacity:0.12;
  pointer-events:none;
  filter:grayscale(1) brightness(2);
  transition:opacity .3s,filter .3s;
  z-index:0;
  display:block;
}
.fs-tile.active .fs-tile-trophy-bg{
  opacity:0.38;
  filter:none drop-shadow(0 2px 8px var(--ceremony-glow));
}
/* Keep tile text above watermark */
.fs-tile-flag,.fs-tile-name,.fs-tile-year,.fs-tile-dot{position:relative;z-index:1}

.fs-tile-flag{font-size:18px;line-height:1}
.fs-tile-name{font:700 11px/1 'Syne',sans-serif;color:var(--fs-text);white-space:nowrap}
.fs-tile-year{font:500 9px/1 'Inter',sans-serif;color:var(--fs-dim)}
.fs-tile-dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:background .2s}
.fs-tile.active .fs-tile-dot{background:var(--ceremony-accent);box-shadow:0 0 6px var(--ceremony-glow)}

/* ── DATA BAR ── */
.fs-databar{margin:14px 20px 0;display:none;align-items:center;justify-content:space-between;background:var(--fs-panel);border:1px solid var(--fs-border);border-radius:10px;padding:10px 14px}
.fs-databar-left{display:flex;align-items:center;gap:9px}
.fs-databar-icon{width:28px;height:28px;border-radius:7px;background:var(--ceremony-dim);border:1px solid rgba(232,178,0,.18);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:background .4s}
.fs-databar-title{font:600 12px/1 'Inter',sans-serif;color:var(--fs-text);letter-spacing:-.1px}
.fs-databar-sub{font:400 10px/1 'Inter',sans-serif;color:var(--fs-dim);margin-top:2px}
.fs-progress{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:5px 10px;flex-shrink:0}
.fs-progress-n{font:700 11px/1 'Inter',sans-serif;color:var(--ceremony-accent);transition:color .4s}
.fs-progress-sep{font:400 10px/1 'Inter',sans-serif;color:var(--fs-dim)}

/* ── STAGE ── */
.fs-stage{margin:14px 0 0;position:relative;display:none}
.fs-carousel-wrap{margin:0 20px;width:calc(100% - 40px);aspect-ratio:4/5;border-radius:20px;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,.6),0 1px 0 rgba(255,255,255,.06) inset;position:relative}
.fs-track{display:flex;height:100%;transition:transform .38s cubic-bezier(.4,0,.2,1)}

/* ── ARROWS — base style: dark (for light ballot slides) ── */
.fs-arrow{
  position:absolute;top:50%;transform:translateY(-50%);z-index:60;
  width:34px;height:34px;border-radius:50%;
  /* Default: visible on white/light backgrounds */
  border:1.5px solid rgba(0,0,0,0.2);
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(8px);
  box-shadow:0 2px 14px rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.15);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:opacity .2s,transform .18s,background .25s,border-color .25s;
  padding:0;
}
.fs-arrow:hover{background:rgba(255,255,255,0.98);transform:translateY(-50%) scale(1.08)}
.fs-arrow:active{transform:translateY(-50%) scale(.93)}
/* Dark icon for light slides */
.fs-arrow svg{
  width:16px;height:16px;
  stroke:rgba(0,0,0,0.72);
  fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;
  transition:stroke .25s;
}
.fs-arrow-l{left:8px}.fs-arrow-r{right:8px}
.fs-arrow-hidden{opacity:0;pointer-events:none}

/* Dark-slide variant applied by JS */
.fs-arrow.fs-arrow--dark-slide{
  border-color:rgba(255,255,255,.15);
  background:rgba(255,255,255,.1);
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.fs-arrow.fs-arrow--dark-slide:hover{background:rgba(255,255,255,.2)}
.fs-arrow.fs-arrow--dark-slide svg{stroke:rgba(255,255,255,.85)}

/* ── STEPPER ── */
.fs-stepper-wrap{margin:12px 20px 0;display:none;flex-direction:column;gap:6px}
.fs-stepper{display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.fs-stepper::-webkit-scrollbar{display:none}
.fs-step{flex-shrink:0;height:3px;min-width:18px;flex:1;border-radius:2px;background:rgba(255,255,255,.1);cursor:pointer;transition:background .25s,transform .15s;position:relative;overflow:hidden}
.fs-step::after{content:'';position:absolute;inset:0;background:var(--ceremony-accent);transform:scaleX(0);transform-origin:left;transition:transform .35s cubic-bezier(.4,0,.2,1),background .4s;border-radius:2px}
.fs-step.active::after{transform:scaleX(1)}
.fs-step.visited::after{background:color-mix(in srgb,var(--ceremony-accent) 35%,transparent);transform:scaleX(1)}
.fs-step:hover{transform:scaleY(1.8)}

/* ── DETAILS ── */
.fs-details{margin:12px 20px 0;background:var(--fs-panel);border:1px solid var(--fs-border);border-radius:var(--fs-radius);padding:13px 15px;display:none}
.fs-details-num{font:700 10px/1 'Inter',sans-serif;color:var(--fs-muted);letter-spacing:.08em;margin-bottom:3px}
.fs-details-title{font:700 13px/1 'Syne',sans-serif;color:var(--fs-text);letter-spacing:-.2px;margin-bottom:3px}
.fs-details-desc{font:400 11px/1.5 'Inter',sans-serif;color:var(--fs-dim)}

/* ── DOWNLOAD ── */
.fs-dl-wrap{margin:10px 20px 0;display:none}
.fs-dl-btn{width:100%;height:52px;border-radius:12px;border:none;background:var(--ceremony-accent);color:#0A0A0A;font:800 13px/1 'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:all .2s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 20px var(--ceremony-glow);position:relative;overflow:hidden}
.fs-dl-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 60%);pointer-events:none}
.fs-dl-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px var(--ceremony-glow);filter:brightness(1.05)}
.fs-dl-btn:active{transform:scale(.98)}
.fs-dl-btn:disabled{opacity:.55;cursor:wait;pointer-events:none}
.fs-dl-btn svg{width:17px;height:17px;stroke:#0A0A0A;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
/* ── DOWNLOAD BUTTON STATES ── */
.fs-dl-btn-icon {
  font-size: 16px;
  line-height: 1;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
.fs-dl-btn-label {
  font: 800 13px/1 'Inter', sans-serif;
  letter-spacing: -.1px;
}

/* entrance pop when icon swaps */
.fs-dl-btn[data-state] .fs-dl-btn-icon {
  animation: fsDlIconPop .35s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes fsDlIconPop {
  from { transform: scale(.5) rotate(-15deg); opacity: 0; }
  to   { transform: scale(1)  rotate(0deg);   opacity: 1; }
}

/* label slide-in */
.fs-dl-btn[data-state] .fs-dl-btn-label {
  animation: fsDlLabelIn .28s cubic-bezier(.4,0,.2,1) both;
  animation-delay: .04s;
}
@keyframes fsDlLabelIn {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0);   }
}

/* loading — pulse glow */
.fs-dl-btn[data-state="loading"] {
  background: var(--ceremony-accent);
  animation: fsDlPulse 1.1s ease-in-out infinite;
}
@keyframes fsDlPulse {
  0%, 100% { box-shadow: 0 4px 20px var(--ceremony-glow); }
  50%       { box-shadow: 0 4px 32px rgba(232,178,0,.55), 0 0 0 4px rgba(232,178,0,.12); }
}

/* success — brief green flash */
.fs-dl-btn[data-state="success"] {
  background: #22c55e;
  box-shadow: 0 4px 24px rgba(34,197,94,.4);
  animation: none;
}

/* error — red */
.fs-dl-btn[data-state="error"] {
  background: #ef4444;
  box-shadow: 0 4px 20px rgba(239,68,68,.35);
  animation: none;
}

/* ── LOADING / EMPTY ── */
.fs-loading{display:flex;align-items:center;justify-content:center;padding:40px 20px;gap:10px;color:var(--fs-dim);font:400 12px/1 'Inter',sans-serif}
.fs-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--ceremony-accent);border-radius:50%;animation:fsSpin .8s linear infinite;flex-shrink:0;transition:border-top-color .4s}
@keyframes fsSpin{to{transform:rotate(360deg)}}
.fs-empty{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;gap:12px}
.fs-empty-icon{font-size:36px;opacity:.3}
.fs-empty-text{font:400 13px/1.6 'Inter',sans-serif;color:rgba(255,255,255,.28)}

/* ── SKELETON ── */
.fs-skel-slide{margin:0 20px;width:calc(100% - 40px);aspect-ratio:4/5;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);border:1px solid rgba(255,255,255,.06)}
@keyframes fsSkelShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.fs-skel-bar{background:linear-gradient(90deg,rgba(255,255,255,.04) 0%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 100%);background-size:200% 100%;animation:fsSkelShimmer 1.6s ease-in-out infinite;border-radius:8px}

/* ── ANIMATIONS ── */
@keyframes fsFadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fs-shell>*{animation:fsFadeUp .4s cubic-bezier(.4,0,.2,1) both}
.fs-shell>*:nth-child(1){animation-delay:0s}
.fs-shell>*:nth-child(2){animation-delay:.06s}
.fs-shell>*:nth-child(3){animation-delay:.12s}
.fs-shell>*:nth-child(4){animation-delay:.18s}
.fs-shell>*:nth-child(5){animation-delay:.22s}
.fs-shell>*:nth-child(6){animation-delay:.26s}

/* ════ SLIDE 0 — HOOK ════ */
.fs-s0{background:#080808;overflow:hidden;position:relative;width:100%;height:100%}
.fs-s0-grid{position:absolute;inset:0;z-index:0;display:flex;flex-direction:row;gap:4px;transform:rotate(-12deg) scale(1.38);transform-origin:center center}
.fs-s0-strip{flex:1;display:flex;flex-direction:column;gap:4px}
.fs-s0-strip:nth-child(even){margin-top:40px}
.fs-s0-strip:nth-child(3n){margin-top:20px}
.fs-s0-cell{flex-shrink:0;width:100%;aspect-ratio:2/3;border-radius:6px;background:#1a1a1a;overflow:hidden;position:relative}
.fs-s0-cell img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;filter:saturate(.5) brightness(.65)}
.fs-s0-overlay{position:absolute;inset:0;z-index:1;background:radial-gradient(ellipse 65% 55% at 50% 50%,rgba(8,8,8,.9) 0%,rgba(8,8,8,.55) 45%,transparent 72%),linear-gradient(180deg,rgba(8,8,8,.65) 0%,transparent 28%,transparent 68%,rgba(8,8,8,.75) 100%)}
.fs-s0-grain{position:absolute;inset:0;z-index:2;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px 160px;opacity:.06;mix-blend-mode:overlay}
.fs-s0-content{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px 20px}
.fs-s0-badge{display:inline-flex;align-items:center;gap:6px;background:var(--ceremony-dim);border:1px solid rgba(232,178,0,.3);border-radius:20px;padding:4px 12px;margin-bottom:14px;transition:background .4s,border-color .4s}
.fs-s0-badge-txt{font:700 8px/1 'Inter',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:var(--ceremony-accent);transition:color .4s}
.fs-s0-flag{font-size:26px;line-height:1;margin-bottom:10px}
.fs-s0-title{font:800 38px/0.9 'Syne',sans-serif;letter-spacing:-2px;color:#fff;margin-bottom:2px;text-shadow:0 2px 24px rgba(0,0,0,.6)}
.fs-s0-year{font:800 38px/0.9 'Syne',sans-serif;letter-spacing:-2px;color:var(--ceremony-accent);margin-bottom:16px;transition:color .4s}
.fs-s0-rule{width:28px;height:2px;background:var(--ceremony-accent);border-radius:2px;margin-bottom:14px;transition:background .4s}
.fs-s0-subtitle{font:400 11px/1.5 'Inter',sans-serif;color:rgba(255,255,255,.45);letter-spacing:.04em}
.fs-s0-subtitle em{font-style:normal;color:rgba(255,255,255,.72)}
.fs-s0-oscars{position:absolute;bottom:-8px;right:-6px;z-index:6;display:flex;align-items:flex-end;gap:0;overflow:visible}
.fs-s0-oscar-sm img{width:38px;height:auto;opacity:0.7;transform:translateX(6px) rotate(-14deg);filter:drop-shadow(0 3px 10px rgba(232,178,0,.35));display:block}
.fs-s0-oscar-lg img{width:62px;height:auto;transform:rotate(8deg);filter:drop-shadow(0 5px 16px rgba(232,178,0,.55));display:block}
.fs-s0-oscar-sm span{font-size:28px;line-height:1;opacity:.55;transform:translateX(5px);display:block}
.fs-s0-oscar-lg span{font-size:46px;line-height:1;display:block}

.fs-slide-logo{position:absolute;top:10px;right:12px;z-index:20;width:28px;height:28px;border-radius:50%;object-fit:cover;opacity:.9}

/* ════ SLIDE N — BALLOT ════ */
.fs-ballot{background:#FAFAF7;overflow:hidden;position:relative;width:100%;height:100%}
.fs-ballot-stripe{position:absolute;top:0;left:0;right:0;height:3px;z-index:2;background:var(--ceremony-accent);transition:background .4s}
.fs-ballot-blob{background:radial-gradient(circle,var(--ceremony-dim-8,rgba(232,178,0,.08)) 0%,transparent 70%)}
.fs-ballot-grain{position:absolute;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:160px 160px;opacity:.04;mix-blend-mode:multiply}
.fs-ballot-cat-zone{position:absolute;top:20px;left:14px;right:50px;z-index:5}
.fs-ballot-cat-eyebrow{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.fs-ballot-cat-rule{width:16px;height:2px;background:var(--ceremony-accent);border-radius:2px;flex-shrink:0;transition:background .4s}
.fs-ballot-cat-lbl{font:700 7px/1 'Inter',sans-serif;letter-spacing:.2em;text-transform:uppercase;color:rgba(30,26,20,.35)}
.fs-ballot-cat-name{font:800 clamp(17px,5vw,22px)/1 'Syne',sans-serif;letter-spacing:-.5px;color:#1A1A1A}

.fs-ballot-hero{position:absolute;top:76px;left:14px;right:14px;height:172px;z-index:5;display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(10px);overflow:visible;transition:opacity .3s ease,transform .3s ease;pointer-events:none}
.fs-ballot-hero.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.fs-ballot-hero-poster-wrap{position:relative;flex-shrink:0;width:90px;height:132px}
.fs-ballot-hero-poster-wrap .fs-ballot-hero-poster{width:100%;height:100%}
.fs-ballot-hero-poster{width:90px;height:132px;border-radius:10px;object-fit:cover;object-position:center top;background:rgba(30,26,20,.1);border:1px solid rgba(30,26,20,.1);flex-shrink:0;box-shadow:0 6px 24px rgba(0,0,0,.18);display:block;transition:opacity .3s}
.fs-ballot-hero-poster.ph{display:flex;align-items:center;justify-content:center;font:800 20px/1 'Syne',sans-serif;color:rgba(30,26,20,.18)}
.fs-ballot-hero-info{flex:1;min-width:0}
.fs-ballot-hero-name{font:800 clamp(14px,4.5vw,18px)/1.05 'Syne',sans-serif;letter-spacing:-.4px;color:#1A1A1A;margin-bottom:4px;word-break:break-word}
.fs-ballot-hero-film{font:400 10px/1.4 'Inter',sans-serif;color:rgba(30,26,20,.5);font-style:italic;margin-bottom:10px}
.fs-ballot-hero-badge{display:inline-flex;align-items:center;gap:5px;background:var(--ceremony-accent);border-radius:20px;padding:4px 10px;transition:background .4s}
.fs-ballot-hero-badge svg{width:9px;height:9px;stroke:#0A0A0A;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.fs-ballot-hero-badge-txt{font:700 7px/1 'Inter',sans-serif;letter-spacing:.1em;text-transform:uppercase;color:#0A0A0A}
.fs-ballot-hero-trophy-badge{position:absolute;bottom:-8px;right:-8px;z-index:10;pointer-events:none}
.fs-ballot-hero-trophy-badge img{width:30px;height:auto;transform:rotate(12deg);filter:drop-shadow(0 3px 10px rgba(232,178,0,.6));display:block}
.fs-ballot-hero-trophy-badge span{font-size:20px;line-height:1;display:block;filter:drop-shadow(0 2px 8px rgba(232,178,0,.4));transform:rotate(12deg)}
.fs-ballot-hero-empty{position:absolute;top:76px;left:14px;right:14px;height:172px;z-index:4;display:flex;align-items:center;justify-content:center}
.fs-ballot-hero-empty-inner{text-align:center}
.fs-ballot-hero-empty-icon{font-size:42px;opacity:.1;line-height:1;margin-bottom:8px;transition:filter .4s}
.fs-ballot-hero-empty-txt{font:400 10px/1.5 'Inter',sans-serif;color:rgba(30,26,20,.25)}

.fs-ballot[data-count="7"] .fs-ballot-hero,.fs-ballot[data-count="8"] .fs-ballot-hero,.fs-ballot[data-count="9"] .fs-ballot-hero,.fs-ballot[data-count="10"] .fs-ballot-hero{top:68px;height:118px;gap:10px}

<!-- JAVASCRIPT -->
<script>
var fsCeremonies  = [];
var fsCurrent     = null;
var fsSlides      = [];
var fsSlideIdx    = 0;
var fsPicks       = {};
var fsSeen        = {};
var fsImgCache    = {};
var fsInited      = false;
var fsTotalSlides = 0;

var FS_LOGO_URL = 'https://i.imgur.com/U6QbyJG.png';

var FS_TROPHY_MAP = {
  'oscars':  'https://i.imgur.com/WWokY3d.png',
  'cesar':   'https://i.imgur.com/08b2snc.png',
  'cesars':  'https://i.imgur.com/08b2snc.png',
  'baftas':  'https://i.imgur.com/tUAEh4E.png',
  'bafta':   'https://i.imgur.com/tUAEh4E.png',
  'cannes':  'https://i.imgur.com/aoPPrze.png',
  'capucines': 'https://i.imgur.com/aoPPrze.png'
};

function fsTrophyUrl() {
  var key = (fsCurrent.name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  for (var k in FS_TROPHY_MAP) {
    if (key.indexOf(k) !== -1) return FS_TROPHY_MAP[k];
  }
  return null;
}

/* Trophy URL for any ceremony name — used for strip tiles */
function fsTrophyUrlForName(name) {
  var key = (name || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  for (var k in FS_TROPHY_MAP) {
    if (key.indexOf(k) !== -1) return FS_TROPHY_MAP[k];
  }
  return null;
}

function fsTrophyOscarsHtml() {
  var tUrl = fsTrophyUrl();
  var sm = tUrl
    ? '<div class="fs-s0-oscar-sm"><img src="' + tUrl + '" alt="trophy"></div>'
    : '<div class="fs-s0-oscar-sm"><span>🏆</span></div>';
  var lg = tUrl
    ? '<div class="fs-s0-oscar-lg"><img src="' + tUrl + '" alt="trophy"></div>'
    : '<div class="fs-s0-oscar-lg"><span>🏆</span></div>';
  return '<div class="fs-s0-oscars">' + sm + lg + '</div>';
}

function fsTrophyBadgeHtml() {
  var tUrl = fsTrophyUrl();
  return tUrl
    ? '<div class="fs-ballot-hero-trophy-badge"><img src="' + tUrl + '" alt="trophy"></div>'
    : '<div class="fs-ballot-hero-trophy-badge"><span>🏆</span></div>';
}

/* ── BOOT ── */
function loadFestival() {
  if (fsInited) return;
  fsInited = true;
  google.script.run
    .withSuccessHandler(function(r) {
      if (!r.success || !r.data || !r.data.length) { fsShowEmpty(); return; }
      fsCeremonies = r.data;
      fsBuildStrip();
      fsSelectCeremony(0);
    })
    .withFailureHandler(fsShowEmpty)
    .getFestivalData();
}

/* ── STRIP — tiles with trophy watermark background ── */
function fsBuildStrip() {
  var strip = document.getElementById('fs-strip');
  strip.innerHTML = '';
  fsCeremonies.forEach(function(c, i) {
    var tUrl = fsTrophyUrlForName(c.name);
    /* Trophy watermark: img if URL known, otherwise a faint emoji fallback */
    var trophyBgHtml = tUrl
      ? '<img class="fs-tile-trophy-bg" src="' + tUrl + '" alt="" aria-hidden="true" loading="lazy">'
      : '<span class="fs-tile-trophy-bg" aria-hidden="true" style="display:flex;align-items:flex-end;justify-content:flex-end;font-size:38px;line-height:1;padding-bottom:0">🏆</span>';

    var t = document.createElement('div');
    t.className = 'fs-tile' + (i === 0 ? ' active' : '');
    t.innerHTML =
      trophyBgHtml +
      '<div class="fs-tile-flag">' + (c.country || '🎬') + '</div>' +
      '<div class="fs-tile-name">' + c.name + '</div>' +
      '<div class="fs-tile-year">' + c.year + '</div>' +
      '<div class="fs-tile-dot"></div>';
    (function(idx) {
      t.addEventListener('click', function() {
        document.querySelectorAll('.fs-tile').forEach(function(el, ti) {
          el.classList.toggle('active', ti === idx);
        });
        t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        fsSelectCeremony(idx);
      });
    })(i);
    strip.appendChild(t);
  });
}

/* ── SELECT CEREMONY ── */
function fsSelectCeremony(idx) {
  fsCurrent  = fsCeremonies[idx];
  fsSlideIdx = 0;
  fsPicks    = {};
  fsSeen     = {};
  fsHookBlob        = null;
  fsHookBlobPending = false;
  fsApplyAccent(fsCurrent.color_accent || '#E8B200');

  var cats  = Object.keys(fsCurrent.categories || {});
  var total = cats.length;

  var db = document.getElementById('fs-databar');
  if (db) db.style.display = 'flex';
  fsSetTxt('fs-databar-icon',  fsCurrent.country || '🏆');
  fsSetTxt('fs-databar-title', fsCurrent.name + ' ' + fsCurrent.year);
  fsSetTxt('fs-prog-total',    total);
  fsUpdateProgress();

  var stage = document.getElementById('fs-stage');
  if (stage) stage.style.display = 'block';
  fsToggleSkel(true);

  fsSlides      = fsBuildConfig(fsCurrent);
  fsTotalSlides = fsSlides.length;
  fsSetTxt('fs-databar-sub', total + ' catégories · ' + fsTotalSlides + ' slides');

  fsFetchImages(fsCurrent, function() {
    fsBuildCarousel();
    fsBuildStepper();
    fsToggleSkel(false);
    fsGoTo(0);
  });
}

/* ── CONFIG ── */
function fsBuildConfig(c) {
  var s = [{ type: 'hook' }];
  Object.keys(c.categories || {}).forEach(function(cat, i) {
    s.push({ type: 'ballot', category: cat, nominees: c.categories[cat], index: i + 1 });
  });
  s.push({ type: 'recap' });
  return s;
}

/* ── BUILD CAROUSEL ── */
function fsBuildCarousel() {
  var track = document.getElementById('fs-track');
  track.innerHTML = '';
  track.style.width = (fsTotalSlides * 100) + '%';
  fsSlides.forEach(function(slide, i) {
    var el = document.createElement('div');
    el.id  = 'fs-sl-' + i;
    el.style.cssText = 'flex-shrink:0;height:100%;width:' + (100 / fsTotalSlides) + '%;position:relative;overflow:hidden';
    if (slide.type === 'hook')   el.innerHTML = fsHookHtml();
    if (slide.type === 'ballot') el.innerHTML = fsBallotHtml(slide, i);
    if (slide.type === 'recap')  el.innerHTML = fsRecapHtml();
    track.appendChild(el);
  });
  fsAttachHandlers();
}

/* ── ARROW STYLE — adapt to dark vs light slide ── */
function fsUpdateArrowStyle(idx) {
  var slide  = fsSlides[idx];
  var isDark = slide && (slide.type === 'hook' || slide.type === 'recap');
  ['fs-arrow-l','fs-arrow-r'].forEach(function(id) {
    var btn = document.getElementById(id);
    if (!btn) return;
    btn.classList.toggle('fs-arrow--dark-slide', isDark);
  });
}

/* ── HOOK HTML  v3 ── */
function fsHookHtml() {
  var c    = fsCurrent;
  var cats = Object.keys(c.categories || {});
  var allNoms = [];
  cats.forEach(function(cat) {
    (c.categories[cat] || []).forEach(function(n) { allNoms.push(n); });
  });

  var STRIPS = 6, CELLS = 8;
  var stripsHtml = '';
  for (var s = 0; s < STRIPS; s++) {
    stripsHtml += '<div class="fs-s0-strip">';
    for (var ci = 0; ci < CELLS; ci++) {
      var nom = allNoms.length ? allNoms[(s * CELLS + ci) % allNoms.length] : null;
      var key = nom ? (nom.nominee_name + '|' + nom.media_type) : null;
      var url = key ? (fsImgCache[key] || null) : null;
      stripsHtml += '<div class="fs-s0-cell">';
      if (url) stripsHtml += '<img src="' + url + '" alt="" loading="lazy">';
      stripsHtml += '</div>';
    }
    stripsHtml += '</div>';
  }

  return (
    '<div class="fs-s0">' +

}

/* ── BALLOT HTML  v3 ── */
function fsBallotHtml(slide, slideIdx) {
  var c        = fsCurrent;
  var nominees = slide.nominees || [];

  var heroHtml     = '';

    var heroKey = pick.nominee_name + '|' + pick.media_type;
    var heroUrl = fsImgCache[heroKey] || null;
    var posterInner = heroUrl
      ? '<img class="fs-ballot-hero-poster" src="' + heroUrl + '" alt="' + fsEsc(pick.nominee_name) + '">'

    var heroImgHtml =

        posterInner + fsTrophyBadgeHtml() +

    var filmLine = (pick.film_title && pick.film_title !== pick.nominee_name)

        filmLine +

          '<svg viewBox="0 0 12 10"><polyline points="1 5 4.5 8.5 11 1"/></svg>' +

  var stripHtml = '';
  nominees.forEach(function(n, ni) {

    var isMovie = (n.media_type === 'movie');

    var filmRow = isMovie

    var seenBadge =

        '<span class="fs-nom-th-seen-badge-lbl">Vu</span>' +
      '</div>';
    stripHtml +=
      '<div class="' + cls + '" data-cat="' + fsEsc(slide.category) + '" data-idx="' + ni + '">' +
        seenBadge + imgHtml + nameRow + filmRow +
        '<div class="fs-nom-th-swipe-hint"></div>' +
      '</div>';
  });

  return (
    '<div class="fs-ballot" data-count="' + nominees.length + '">' +
      '<div class="fs-ballot-stripe"></div>' +
      '<div class="fs-ballot-blob"></div>' +
      '<div class="fs-ballot-grain"></div>' +
      '<img class="fs-slide-logo" src="' + FS_LOGO_URL + '" alt="GrandÉcran" loading="lazy">' +
      '<div class="fs-ballot-cat-zone">' +
        '<div class="fs-ballot-cat-eyebrow">' +
          '<div class="fs-ballot-cat-rule"></div>' +
          '<span class="fs-ballot-cat-lbl">Ma sélection</span>' +
        '</div>' +
        '<div class="fs-ballot-cat-name">' + fsEsc(slide.category) + '</div>' +
      '</div>' +
      '<div class="fs-ballot-hero-empty" style="' + emptyDisplay + '">' +
        '<div class="fs-ballot-hero-empty-inner">' +
          '<div class="fs-ballot-hero-empty-icon">🏆</div>' +

      '<div class="' + heroClass + '">' + heroHtml + '</div>' +

/* ── HANDLERS ── */
function fsAttachHandlers() {
  document.querySelectorAll('#fs-track .fs-nom-th').forEach(function(thumb) {
    var cat  = thumb.getAttribute('data-cat');
    var idx  = parseInt(thumb.getAttribute('data-idx'));
    var pressTimer = null, didLongPress = false, startX = 0, startY = 0;

    function onPressStart(e) {
      startX = (e.touches ? e.touches[0].clientX : e.clientX);
      startY = (e.touches ? e.touches[0].clientY : e.clientY);
      didLongPress = false;
      thumb.classList.add('fs-nom-pressing');
      pressTimer = setTimeout(function() {
        didLongPress = true;
        thumb.classList.remove('fs-nom-pressing');
        thumb.classList.add('fs-nom-voted-flash');
        setTimeout(function() { thumb.classList.remove('fs-nom-voted-flash'); }, 400);
        if (navigator.vibrate) navigator.vibrate(40);
        fsHandleVote(cat, idx);
      }, 500);
    }
    function onPressMove(e) {
      var cx = (e.touches ? e.touches[0].clientX : e.clientX);
      var cy = (e.touches ? e.touches[0].clientY : e.clientY);
      if (Math.abs(cx - startX) > 10 || Math.abs(cy - startY) > 10) {
        clearTimeout(pressTimer); thumb.classList.remove('fs-nom-pressing');
      }
    }
    function onPressEnd() {
      clearTimeout(pressTimer); thumb.classList.remove('fs-nom-pressing');
      if (!didLongPress) fsHandleSeen(cat, idx);
    }

    thumb.addEventListener('touchstart',  onPressStart, { passive: true });
    thumb.addEventListener('touchmove',   onPressMove,  { passive: true });
    thumb.addEventListener('touchend',    onPressEnd);
    thumb.addEventListener('touchcancel', onPressEnd);
    thumb.addEventListener('mousedown',   onPressStart);
    thumb.addEventListener('mousemove',   onPressMove);
    thumb.addEventListener('mouseup',     onPressEnd);
  });
}

function fsHandleSeen(cat, idx) {
  if (!fsSeen[cat]) fsSeen[cat] = new Set();
  if (fsSeen[cat].has(idx)) fsSeen[cat].delete(idx); else fsSeen[cat].add(idx);
  fsRefreshBallot(cat);
  fsUpdateDetails(fsSlideIdx);
}

function fsHandleVote(cat, idx) {
  if (fsPicks[cat] === idx) { delete fsPicks[cat]; }
  else {
    fsPicks[cat] = idx;
    if (!fsSeen[cat]) fsSeen[cat] = new Set();
    fsSeen[cat].add(idx);
  }
  fsRefreshBallot(cat);
  fsRefreshRecap();
  fsUpdateProgress();
  fsUpdateDetails(fsSlideIdx);
}

function fsRefreshBallot(cat) {
  for (var i = 0; i < fsSlides.length; i++) {
    if (fsSlides[i].type === 'ballot' && fsSlides[i].category === cat) {
      var el = document.getElementById('fs-sl-' + i);
      if (el) { el.innerHTML = fsBallotHtml(fsSlides[i], i); fsAttachHandlers(); }
      break;
    }
  }
}

function fsRefreshRecap() {
  var el = document.getElementById('fs-sl-' + (fsTotalSlides - 1));
  if (el) el.innerHTML = fsRecapHtml();
}

/* ── STEPPER ── */
function fsBuildStepper() {
  var st = document.getElementById('fs-stepper');
  var wr = document.getElementById('fs-stepper-wrap');
  st.innerHTML = '';
  for (var i = 0; i < fsTotalSlides; i++) {
    var s = document.createElement('div');
    s.className = 'fs-step' + (i === 0 ? ' active' : '');
    (function(si) { s.addEventListener('click', function() { fsGoTo(si); }); })(i);
    st.appendChild(s);
  }
  wr.style.display = 'flex';
}

function fsUpdateStepper(idx) {
  document.querySelectorAll('#fs-stepper .fs-step').forEach(function(s, i) {
    s.classList.toggle('active',  i === idx);
    s.classList.toggle('visited', i < idx);
  });
}

/* ── NAV ── */
function fsGoTo(idx) {
  if (fsTotalSlides === 0) return;
  idx = Math.max(0, Math.min(idx, fsTotalSlides - 1));
  fsSlideIdx = idx;
  var t = document.getElementById('fs-track');
  if (t) t.style.transform = 'translateX(-' + (idx * (100 / fsTotalSlides)) + '%)';
  fsUpdateStepper(idx);
  var aL = document.getElementById('fs-arrow-l');
  var aR = document.getElementById('fs-arrow-r');
  if (aL) aL.classList.toggle('fs-arrow-hidden', idx === 0);
  if (aR) aR.classList.toggle('fs-arrow-hidden', idx === fsTotalSlides - 1);
  /* ← KEY FIX: update arrow colour to match current slide background */
  fsUpdateArrowStyle(idx);
  fsUpdateDetails(idx);
}

function fsUpdateDetails(idx) {
  var slide = fsSlides[idx];
  if (!slide) return;
  var detEl = document.getElementById('fs-details');
  var dlWr  = document.getElementById('fs-dl-wrap');
  if (detEl) detEl.style.display = 'block';
  if (dlWr)  dlWr.style.display  = 'block';
  fsSetTxt('fs-det-num', String(idx + 1).padStart(2, '0'));
  if (slide.type === 'hook') {
    fsSetTxt('fs-det-title', fsCurrent.name + ' ' + fsCurrent.year + ' — Hook');
    fsSetTxt('fs-det-desc',  "La slide d'accroche de ton post");
  } else if (slide.type === 'ballot') {
    var p = fsPicks[slide.category] !== undefined ? slide.nominees[fsPicks[slide.category]] : null;
    fsSetTxt('fs-det-title', slide.category);
    fsSetTxt('fs-det-desc',  p
      ? '✦ Ton choix : ' + p.nominee_name
      : slide.nominees.length + ' nominés · Appuie longuement sur un poster pour voter');
  } else {
    fsSetTxt('fs-det-title', 'Récapitulatif');
    fsSetTxt('fs-det-desc',
      Object.keys(fsPicks).length + ' / ' +
      Object.keys(fsCurrent.categories || {}).length + ' catégories sélectionnées');
  }
}

function fsUpdateProgress() {
  var n = document.getElementById('fs-prog-n');
  if (n) n.textContent = Object.keys(fsPicks).length;
}

/* ── TOUCH SWIPE ── */
(function() {
  var sx = 0;
  document.addEventListener('touchstart', function(e) {
    var w = document.getElementById('fs-carousel-wrap');
    if (w && w.contains(e.target)) sx = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    var w = document.getElementById('fs-carousel-wrap');
    if (!w || !w.contains(e.target)) return;
    var dx = sx - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) fsGoTo(fsSlideIdx + (dx > 0 ? 1 : -1));
  }, { passive: true });
})();

/* ── IMAGE FETCHING ── */
function fsFetchImages(ceremony, cb) {
  var all = [];
  Object.keys(ceremony.categories || {}).forEach(function(cat) {
    (ceremony.categories[cat] || []).forEach(function(n) { all.push(n); });
  });
  if (!all.length) { cb(); return; }
  var rem = all.length;
  var done = function() {
    if (--rem <= 0) { cb(); setTimeout(fsPreRenderHook, 400); }
  };
  all.forEach(function(n) {
    var key = n.nominee_name + '|' + n.media_type;
    if (fsImgCache[key] !== undefined) { done(); return; }
    google.script.run
      .withSuccessHandler(function(url) {
        if (!url) { fsImgCache[key] = null; done(); return; }
        google.script.run
          .withSuccessHandler(function(b64) { fsImgCache[key] = b64 || url; done(); })
          .withFailureHandler(function() { fsImgCache[key] = url; done(); })
          .convertImageToBase64(url);
      })
      .withFailureHandler(function() { fsImgCache[key] = null; done(); })
      .fetchNomineeImage(n.nominee_name, n.film_title, n.media_type, fsCurrent.year);
  });
}

/* ── SKELETON ── */
function fsToggleSkel(show) {
  var skel = document.getElementById('fs-skel');
  var wrap = document.getElementById('fs-carousel-wrap');
  if (show) {
    if (skel) { skel.style.display = 'block'; skel.style.opacity = '1'; }
    if (wrap) wrap.style.display = 'none';
  } else {
    if (skel) {
      skel.style.transition = 'opacity .25s'; skel.style.opacity = '0';
      setTimeout(function() { skel.style.display = 'none'; }, 260);
    }
    if (wrap) {
      wrap.style.display = 'block'; wrap.style.opacity = '0';
      wrap.style.transition = 'opacity .3s';
      requestAnimationFrame(function() { wrap.style.opacity = '1'; });
    }
  }
}

/* ── ACCENT ── */
function fsApplyAccent(hex) {
  var root = document.documentElement;
  root.style.setProperty('--ceremony-accent', hex);
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  root.style.setProperty('--ceremony-dim',   'rgba('+r+','+g+','+b+',.12)');
  root.style.setProperty('--ceremony-glow',  'rgba('+r+','+g+','+b+',.25)');
  root.style.setProperty('--ceremony-dim-8', 'rgba('+r+','+g+','+b+',.08)');
  root.style.setProperty('--ceremony-rgb',   r+','+g+','+b);
}

/* ── CAPTURE HELPERS ── */
function fsPrepareSlideForCapture(slideEl) {
  var wrapper = document.getElementById('fs-carousel-wrap');
  var track   = document.getElementById('fs-track');
  if (track) {
    track.setAttribute('data-capture-transform',  track.style.transform  || '');
    track.setAttribute('data-capture-transition', track.style.transition || '');
    track.style.transition = 'none'; track.style.transform = 'none';
  }
  document.querySelectorAll('#fs-track > div').forEach(function(s) {
    if (s !== slideEl) { s.setAttribute('data-capture-hidden','1'); s.style.display='none'; }
  });
  slideEl.setAttribute('data-capture-width',    slideEl.style.width    || '');
  slideEl.setAttribute('data-capture-position', slideEl.style.position || '');
  slideEl.style.width    = (wrapper ? wrapper.offsetWidth : 480) + 'px';
  slideEl.style.position = 'relative';
}

function fsRestoreSlideAfterCapture(slideEl) {
  var track = document.getElementById('fs-track');
  if (track) {
    track.style.transform  = track.getAttribute('data-capture-transform')  || '';
    track.style.transition = track.getAttribute('data-capture-transition') || '';
    track.removeAttribute('data-capture-transform'); track.removeAttribute('data-capture-transition');
  }
  document.querySelectorAll('#fs-track > div[data-capture-hidden]').forEach(function(s) {
    s.style.display = ''; s.removeAttribute('data-capture-hidden');
  });
  slideEl.style.width    = slideEl.getAttribute('data-capture-width')    || '';
  slideEl.style.position = slideEl.getAttribute('data-capture-position') || '';
  slideEl.removeAttribute('data-capture-width'); slideEl.removeAttribute('data-capture-position');
}

var fsHookBlob = null, fsHookBlobPending = false;

function fsPreRenderHook() {
  var slideEl = document.getElementById('fs-sl-0');
  if (!slideEl || fsHookBlob || fsHookBlobPending) return;
  fsHookBlobPending = true;
  var wrapper = document.getElementById('fs-carousel-wrap');
  var w = wrapper ? wrapper.offsetWidth : 480, h = wrapper ? wrapper.offsetHeight : 600;
  loadHtml2Canvas().then(function() {
    var container = document.createElement('div');
    container.style.cssText = 'position:fixed;left:-9999px;top:0;width:'+w+'px;height:'+h+'px;overflow:hidden;z-index:-9999;pointer-events:none;';
    var clone = slideEl.cloneNode(true);
    clone.style.cssText = 'width:'+w+'px;height:'+h+'px;position:relative;overflow:hidden;flex-shrink:0;';
    container.appendChild(clone); document.body.appendChild(container);
    Array.from(clone.querySelectorAll('*')).forEach(function(el) {
      el.style.backdropFilter = 'none'; el.style.webkitBackdropFilter = 'none';
    });
    return html2canvas(clone,{allowTaint:false,useCORS:true,backgroundColor:null,scale:3,logging:false,width:w,height:h}).then(function(canvas) {
      document.body.removeChild(container);
      return new Promise(function(resolve,reject) {
        canvas.toBlob(function(blob) { if(blob) resolve(blob); else reject(new Error('toBlob returned null')); },'image/png');
      });
    }).catch(function(err) { document.body.removeChild(container); throw err; });
  }).then(function(blob) {
    fsHookBlob = blob; fsHookBlobPending = false;
    console.log('[Festival] Hook pre-render OK — '+Math.round(blob.size/1024)+' Ko');
  }).catch(function(err) {
    fsHookBlobPending = false;
    console.warn('[Festival] Hook pre-render failed:', err.message);
  });
}

async function fsDownload() {
  var slide = fsSlides[fsSlideIdx];
  if (!slide || !fsCurrent) return;

  var btn = document.getElementById('fs-dl-btn');
  if (!btn || btn.disabled) return;

  // — cinema sequence —
  var steps = [
    { icon: '🎬', label: 'Tournage en cours…',   dur: 900  },
    { icon: '🎞️', label: 'Montage et post-prod', dur: 1100 },
    { icon: '🎭', label: "C'est en salle !",      dur: 1600 },
  ];

  function setBtnState(icon, label, cls) {
    btn.disabled = true;
    btn.setAttribute('data-state', cls || '');
    btn.innerHTML =
      '<span class="fs-dl-btn-icon">' + icon + '</span>' +
      '<span class="fs-dl-btn-label">' + label + '</span>';
  }

  function resetBtn() {
    btn.disabled = false;
    btn.removeAttribute('data-state');
    btn.innerHTML =
      '<svg viewBox="0 0 24 24" style="width:17px;height:17px;stroke:#0A0A0A;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round">' +
        '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>' +
        '<polyline points="7 10 12 15 17 10"/>' +
        '<line x1="12" y1="15" x2="12" y2="3"/>' +
      '</svg>' +
      'Télécharger cette slide';
  }

  // step 1 — tournage
  setBtnState(steps[0].icon, steps[0].label, 'loading');

  var name = slide.type === 'hook' ? 'hook'
    : slide.type === 'recap' ? 'recap'
    : (slide.category || '').toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
  var filename = 'festival_' +
    ((fsCurrent.name || '').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9_]/g, '_')) +
    '_' + name + '.png';

  try {
    // kick off the actual capture in the background
    var capturePromise = (slide.type === 'hook' && fsHookBlob)
      ? Promise.resolve(fsHookBlob)
      : captureSlideToBlob('fs-sl-' + fsSlideIdx);

    // step 2 — montage (after ~tournage dur)
    await delay(steps[0].dur);
    setBtnState(steps[1].icon, steps[1].label, 'loading');

    // wait for capture to finish (may already be done)
    var blob = await capturePromise;

    // step 3 — en salle
    await delay(steps[1].dur);
    setBtnState(steps[2].icon, steps[2].label, 'success');

    // trigger download
    await shareBlobOrDownload(blob, filename);

    // reset after success display
    await delay(steps[2].dur);
    resetBtn();

  } catch (err) {
    setBtnState('⚠️', 'Erreur — réessaie', 'error');
    await delay(2200);
    resetBtn();
    console.error('[Festival] Download failed:', err);
  }
}

function delay(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, ms); });
}

// Returns a Blob for any slide (mirrors your existing capture logic)
async function captureSlideToBlob(slideId) {
  var slideEl = document.getElementById(slideId);
  if (!slideEl) throw new Error('Slide element not found: ' + slideId);
  var wrapper = document.getElementById('fs-carousel-wrap');
  var w = wrapper ? wrapper.offsetWidth  : 480;
  var h = wrapper ? wrapper.offsetHeight : 600;

  await loadHtml2Canvas();

  var container = document.createElement('div');
  container.style.cssText =
    'position:fixed;left:-9999px;top:0;width:' + w + 'px;height:' + h +
    'px;overflow:hidden;z-index:-9999;pointer-events:none;';
  var clone = slideEl.cloneNode(true);
  clone.style.cssText =
    'width:' + w + 'px;height:' + h + 'px;position:relative;overflow:hidden;flex-shrink:0;';
  container.appendChild(clone);
  document.body.appendChild(container);

  Array.from(clone.querySelectorAll('*')).forEach(function(el) {
    el.style.backdropFilter        = 'none';
    el.style.webkitBackdropFilter  = 'none';
  });

  try {
    var canvas = await html2canvas(clone, {
      allowTaint:      false,
      useCORS:         true,
      backgroundColor: null,
      scale:           3,
      logging:         false,
      width:           w,
      height:          h
    });
    document.body.removeChild(container);
    return await new Promise(function(resolve, reject) {
      canvas.toBlob(function(blob) {
        blob ? resolve(blob) : reject(new Error('toBlob returned null'));
      }, 'image/png');
    });
  } catch (err) {
    document.body.removeChild(container);
    throw err;
  }
}

/* ── EMPTY STATE ── */
function fsShowEmpty() {
  var strip=document.getElementById('fs-strip'), empty=document.getElementById('fs-empty'), stage=document.getElementById('fs-stage');
  if(strip) strip.innerHTML=''; if(empty) empty.style.display='flex'; if(stage) stage.style.display='none';
}

/* ── UTILS ── */
function fsEsc(s) { return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fsSetTxt(id,v) { var el=document.getElementById(id); if(el) el.textContent=v; }
function fsInits(s) { return (s||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(); }
